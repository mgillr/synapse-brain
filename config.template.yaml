# Synapse Brain -- Configuration
#
# Copy to config.yaml and fill in your HuggingFace token.
# Everything else is optional.
#
#   cp config.template.yaml config.yaml
#   python launch_swarm.py --config config.yaml

# --- REQUIRED ---

# HuggingFace token (free account works, read+write access)
# Get one at: https://huggingface.co/settings/tokens
hf_token: ""

# --- OPTIONAL ---

# Number of spores (default: 3)
# 3 = good starting point, 7 = full model diversity
count: 3

# API keys for LLM providers (all optional, all have free tiers)
# Each key adds model diversity. No keys = free-tier only.
api_keys:
  zai: ""          # Z.ai -- GLM-4.7-Flash (free, recommended)
  groq: ""         # Groq -- Llama, Mixtral (free tier)
  google_ai: ""    # Google AI Studio -- Gemini (free tier)
  cerebras: ""     # Cerebras -- fast inference (free tier)

# Your HF username or org (auto-detected from token if blank)
hf_owner: ""

# Space name prefix (default: synapse-spore)
prefix: "synapse-spore"

# --- JOINING AN EXISTING SWARM ---

# To connect your spores to an existing swarm, add peer URLs.
# Your nodes will discover the rest of the network via gossip.
# Leave empty to run a standalone swarm.
peers: []
#  - "https://some-swarm-synapse-spore-000.hf.space"
#  - "https://some-swarm-synapse-spore-001.hf.space"

# --- ADVANCED ---

# Create Spaces as private (default: true)
private: true

# Enable Sentinel on last spore (autonomous code deployment)
sentinel: false

# Enable local Cortex micro-LLM on Sentinel
cortex: false
