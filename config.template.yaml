# Synapse Brain Swarm Configuration
# Copy this file to config.yaml and fill in your values.
# At minimum you need: hf_token + at least one LLM provider key.

# HuggingFace token (required for deployment and model access)
hf_token: "<your-hf-token>"

# Deployment target (your HF org or username)
hf_org: "<your-hf-org>"

# LLM Provider API Keys (at least one required)
# The swarm tries providers in order and falls back automatically.
# Get free keys:
#   Z.ai:        https://open.bigmodel.cn/ (GLM-4 models, generous free tier)
#   Groq:        https://console.groq.com/ (Llama 3.3 70B, 30 req/min free)
#   Cerebras:    https://cloud.cerebras.ai/ (Llama 3.3 70B, 30 req/min free)
#   Google AI:   https://aistudio.google.com/ (Gemini Flash, 15 req/min free)
#   OpenRouter:  https://openrouter.ai/ (various free models)

providers:
  zai_api_key: ""        # Recommended: fast, generous limits
  groq_api_key: ""       # Recommended: very fast inference
  cerebras_api_key: ""   # Fast inference
  google_ai_key: ""      # Gemini Flash free tier
  openrouter_api_key: "" # Various free models

# Spore count (default: 3 for personal use, 7 for full swarm)
spore_count: 3

# Model assignments (optional - defaults to diverse mix)
# Each spore gets a primary model. Leave empty for auto-assignment.
# models:
#   - "Qwen/Qwen3-235B-A22B"
#   - "meta-llama/Llama-3.3-70B-Instruct"
#   - "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
