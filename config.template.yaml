# Synapse Brain Swarm Configuration
# Copy to config.yaml and fill in your values.
# Minimum: hf_token + at least one LLM provider key.

# HuggingFace token (required -- free account works)
# Get one at: https://huggingface.co/settings/tokens
hf_token: ""

# Your HF username or org (Spaces deploy here)
# Leave empty to auto-detect from your token.
hf_owner: ""

# Spore naming prefix (default: synapse-spore)
prefix: "synapse-spore"

# Number of spores (3 for personal use, 7 for full diversity)
count: 3

# Private Spaces (true = only you can access)
private: true

# LLM Provider API Keys
# The swarm tries ALL configured providers as fallback.
# More keys = more resilient. At least one is required.
#
# Free signup links:
#   xAI:        https://console.x.ai/          (Grok models, generous free tier)
#   Google AI:  https://aistudio.google.com/    (Gemini 2.5 Flash, 15 req/min)
#   GitHub:     https://github.com/marketplace/models (Llama 405B + GPT-4o-mini, free)
#   Z.ai:       https://open.bigmodel.cn/       (GLM-4 models, free tier)
#   OpenRouter: https://openrouter.ai/          (27+ free models)
#   LLMAPI:     https://llmapi.ai/              (168 models, free tier)
#   Groq:       https://console.groq.com/       (Llama 3.3 70B, 30 req/min)
#   Cerebras:   https://cloud.cerebras.ai/      (Llama 3.3 70B, 30 req/min)
api_keys:
  xai: ""              # Recommended -- fast, reliable, generous
  google_ai: ""        # Recommended -- Gemini 2.5 Flash is excellent
  github_models: ""    # Use your GitHub PAT (no special scopes needed)
  zai: ""              # GLM thinking models
  openrouter: ""       # 27+ free models as fallback
  llmapi: ""           # 168 Qwen models
  groq: ""
  cerebras: ""

# Join an existing swarm (optional)
# Add peer spore URLs to connect to a running swarm.
# Your spores will gossip with these peers, sharing memories and tasks.
# peers:
#   - "https://orgname-synapse-spore-000.hf.space"
#   - "https://orgname-synapse-spore-001.hf.space"

# Model assignments (optional -- defaults to diverse mix)
# models:
#   - "Qwen/Qwen3-235B-A22B"
#   - "meta-llama/Llama-3.3-70B-Instruct"
#   - "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"

# Advanced: enable Sentinel (autonomous code deployment)
# Requires GITHUB_TOKEN as HF Space secret
sentinel: false

# Advanced: enable Cortex (local micro-LLM on Sentinel)
# Requires ~3GB disk for Qwen3-4B model
cortex: false
